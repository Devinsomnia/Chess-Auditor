<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>chess-auditor overlay</title>
<style>
  :root {
    --light: #ebecd0;
    --dark: #739552;
    --green: rgba(72, 224, 96, 0.55);
    --green-edge: #29c452;
    --yellow: rgba(255, 214, 0, 0.55);
    --yellow-edge: #f4c20d;
  }
  html, body {
    margin: 0; background: transparent; color: #fff;
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  #app { display: flex; gap: 18px; padding: 16px; align-items: flex-start; }
  #board {
    position: relative; width: 560px; height: 560px;
    box-shadow: 0 8px 28px rgba(0,0,0,.45); border-radius: 6px; overflow: hidden;
  }
  .sq { position: absolute; width: 12.5%; height: 12.5%; box-sizing: border-box;
        display: flex; align-items: center; justify-content: center;
        font-size: 46px; line-height: 1; user-select: none; }
  .light { background: var(--light); }
  .dark  { background: var(--dark); }
  .piece-w { color: #fafafa; text-shadow: 0 1px 2px rgba(0,0,0,.6); }
  .piece-b { color: #1b1b1b; text-shadow: 0 1px 1px rgba(255,255,255,.25); }
  .hl { position: absolute; width: 12.5%; height: 12.5%; box-sizing: border-box;
        border-radius: 4px; pointer-events: none; }
  .hl.green  { background: var(--green);  outline: 3px solid var(--green-edge);  outline-offset: -3px; }
  .hl.yellow { background: var(--yellow); outline: 3px solid var(--yellow-edge); outline-offset: -3px; }
  #arrow { position: absolute; inset: 0; pointer-events: none; }
  #side { width: 300px; }
  .panel { background: rgba(18,18,20,.82); border-radius: 10px; padding: 14px 16px;
           margin-bottom: 12px; backdrop-filter: blur(2px); }
  .evalbar { height: 18px; border-radius: 9px; overflow: hidden; background:#111;
             display:flex; }
  .evalbar > .w { background:#f5f5f5; } .evalbar > .b { background:#2b2b2b; }
  .evaltxt { font-size: 22px; font-weight: 700; margin: 6px 0 2px; }
  .evalhint { font-size: 11px; color:#8a9095; margin-top: 4px; }
  #mate { display:none; margin-bottom:12px; padding:12px 14px; border-radius:10px;
          font-size: 22px; font-weight: 800; letter-spacing:.02em; color:#fff;
          text-align:center; box-shadow:0 4px 14px rgba(0,0,0,.5);
          animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.72} }
  .label { font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
           color:#9aa0a6; margin-bottom: 4px; }
  .best { font-size: 30px; font-weight: 800; color: var(--green-edge); }
  .pv { font-size: 14px; color:#cfd3d6; margin-top: 6px; word-spacing: 4px; }
  .warn { color: var(--yellow-edge); font-size: 14px; margin: 3px 0; }
  .warn::before { content: "\26A0\FE0F  "; }
  #status { font-size: 12px; color:#777; }
  /* In-app controls — only shown inside the desktop app, never in a plain
     browser or the OBS browser source (so they never appear on stream). */
  #controls { display: flex; flex-direction: column; gap: 8px; }
  .ctrlbtn { font: 600 14px system-ui; color:#fff; background:#2f6f3a;
             border:1px solid #3c8a49; border-radius:8px; padding:9px 12px;
             cursor:pointer; text-align:center; }
  .ctrlbtn:hover { background:#3c8a49; }
  .ctrlbtn.quit { background:#8a2a33; border-color:#a83641; }
  .ctrlbtn.quit:hover { background:#a83641; }
  .ctrlbtn.move { background:#34343c; border-color:#4a4a55; cursor:move;
                  user-select:none; letter-spacing:.04em; }
  .ctrlbtn.move:hover { background:#41414c; }
</style>
</head>
<body>
<div id="app">
  <div id="board"></div>
  <div id="side">
    <div id="mate"></div>
    <div class="panel">
      <div class="label">Evaluation (your player)</div>
      <div class="evalbar"><div class="w" style="width:50%"></div><div class="b" style="width:50%"></div></div>
      <div class="evaltxt" id="eval">--</div>
      <div class="evalhint">+ = you are winning &nbsp;·&nbsp; #N = you mate in N &nbsp;·&nbsp; #-N = opponent mates you</div>
    </div>
    <div class="panel">
      <div class="label">Best move</div>
      <div class="best" id="best">--</div>
      <div class="pv" id="pv"></div>
    </div>
    <div class="panel">
      <div class="label">Danger</div>
      <div id="warnings"></div>
    </div>
    <div class="panel" id="controls" style="display:none">
      <div class="label">Controls</div>
      <div id="moveHandle" class="ctrlbtn move pywebview-drag-region">⠿ Hold here to move window</div>
      <button id="switchBtn" class="ctrlbtn">⇄ Switch mode</button>
      <button id="quitBtn" class="ctrlbtn quit">✕ Quit app</button>
    </div>
    <div id="status">connecting…</div>
  </div>
</div>

<script>
const GLYPH = { p:"♟", n:"♞", b:"♝", r:"♜", q:"♛", k:"♚" };
const boardEl = document.getElementById("board");

// square index 0..63 (a1=0) -> screen (col,row) given which color is at bottom.
function place(square, weAreWhiteBottom) {
  const file = square % 8;          // 0..7  (a..h)
  const rank = Math.floor(square/8); // 0..7  (1..8)
  let col, row;
  if (weAreWhiteBottom) { col = file;     row = 7 - rank; }
  else                  { col = 7 - file; row = rank;     }
  return { col, row };
}

function parseFenBoard(fen) {
  // returns map: square(0..63) -> piece char (lowercase=black, upper=white)
  const rows = fen.split(" ")[0].split("/");
  const map = {};
  for (let r = 0; r < 8; r++) {
    const rankIndex = 7 - r; // FEN starts at rank 8
    let file = 0;
    for (const ch of rows[r]) {
      if (/\d/.test(ch)) { file += parseInt(ch, 10); }
      else { map[rankIndex * 8 + file] = ch; file++; }
    }
  }
  return map;
}

function render(state) {
  boardEl.innerHTML = "";
  const whiteBottom = (state.our_color !== "black");

  // squares + pieces
  const pieces = state.fen ? parseFenBoard(state.fen) : {};
  for (let sq = 0; sq < 64; sq++) {
    const { col, row } = place(sq, whiteBottom);
    const div = document.createElement("div");
    const isLight = (col + row) % 2 === 0;
    div.className = "sq " + (isLight ? "light" : "dark");
    div.style.left = (col * 12.5) + "%";
    div.style.top  = (row * 12.5) + "%";
    const pc = pieces[sq];
    if (pc) {
      const isWhite = pc === pc.toUpperCase();
      div.innerHTML = `<span class="${isWhite ? "piece-w" : "piece-b"}">${GLYPH[pc.toLowerCase()]}</span>`;
    }
    boardEl.appendChild(div);
  }

  // highlights overlaid on top
  for (const h of (state.highlights || [])) {
    const { col, row } = place(h.square, whiteBottom);
    const hl = document.createElement("div");
    hl.className = "hl " + h.color;
    hl.style.left = (col * 12.5) + "%";
    hl.style.top  = (row * 12.5) + "%";
    hl.title = h.reason || "";
    boardEl.appendChild(hl);
  }

  // best-move arrow
  drawArrow(state, whiteBottom);

  // side panel
  document.getElementById("best").textContent = state.best_san || "--";
  document.getElementById("pv").textContent =
    (state.pv_san && state.pv_san.length) ? state.pv_san.join("  ") : "";
  setEval(state);
  const warnEl = document.getElementById("warnings");
  warnEl.innerHTML = "";
  const warns = state.warnings || [];
  if (!warns.length) { warnEl.innerHTML = '<div style="color:#7bd88f">No immediate danger</div>'; }
  for (const w of warns) {
    const d = document.createElement("div"); d.className = "warn"; d.textContent = w;
    warnEl.appendChild(d);
  }
}

function setEval(state) {
  const el = document.getElementById("eval");
  const barW = boardEl.parentElement.querySelector(".evalbar .w");
  const barB = boardEl.parentElement.querySelector(".evalbar .b");
  const banner = document.getElementById("mate");
  let txt = "--", oursPct = 50;
  banner.style.display = "none";

  // our_cp / our_mate are from YOUR player's POV: positive = you are winning,
  // "#N" = you have mate in N, "#-N" = opponent mates you in N.
  const mate = state.our_mate;
  const cp = state.our_cp;
  if (mate !== null && mate !== undefined) {
    txt = (mate > 0 ? "#" : "#-") + Math.abs(mate);
    oursPct = mate > 0 ? 100 : 0;
    banner.style.display = "block";
    if (mate > 0) {
      banner.textContent = "FORCED MATE IN " + mate + " — YOU";
      banner.style.background = "#1f7a32";
    } else {
      banner.textContent = "MATE THREAT IN " + Math.abs(mate) + " — OPPONENT";
      banner.style.background = "#a32525";
    }
  } else if (cp !== null && cp !== undefined) {
    txt = (cp >= 0 ? "+" : "") + (cp / 100).toFixed(2);
    oursPct = 50 + 50 * Math.tanh(cp / 400); // squashed bar
  }
  el.textContent = txt;
  // The eval bar's bottom (your side) fills with your advantage.
  if (barW && barB) { barW.style.width = oursPct + "%"; barB.style.width = (100 - oursPct) + "%"; }
}

function drawArrow(state, whiteBottom) {
  const old = document.getElementById("arrow");
  if (old) old.remove();
  if (!state.best_uci || state.best_uci.length < 4) return;
  const from = uciSquare(state.best_uci.slice(0, 2));
  const to   = uciSquare(state.best_uci.slice(2, 4));
  const a = center(place(from, whiteBottom));
  const b = center(place(to, whiteBottom));
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.id = "arrow"; svg.setAttribute("viewBox", "0 0 100 100");
  svg.setAttribute("preserveAspectRatio", "none");
  svg.innerHTML = `
    <defs><marker id="ah" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto">
      <path d="M0,0 L4,2 L0,4 Z" fill="#29c452"/></marker></defs>
    <line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
      stroke="#29c452" stroke-width="2.2" stroke-linecap="round"
      marker-end="url(#ah)" opacity="0.95"/>`;
  boardEl.appendChild(svg);
}

function uciSquare(s) {
  const file = s.charCodeAt(0) - 97;       // a..h
  const rank = parseInt(s[1], 10) - 1;     // 1..8
  return rank * 8 + file;
}
function center({col, row}) { return { x: col * 12.5 + 6.25, y: row * 12.5 + 6.25 }; }

let lastJson = "";
let lastVersion = -1;
// ?once=1 -> render the current state a single time and stop (no long-poll).
// Handy for headless screenshots / thumbnails of the overlay.
const pollOnce = new URLSearchParams(location.search).has("once");
async function poll() {
  for (;;) {
    try {
      // Long-poll: the server parks this request until the state version
      // moves past `v` (or ~25s pass), so new analysis renders immediately
      // instead of waiting for the next fixed-interval poll.
      const r = await fetch(`/state.json?v=${lastVersion}`, { cache: "no-store" });
      const text = await r.text();
      const s = JSON.parse(text);
      lastVersion = (typeof s.v === "number") ? s.v : -1;
      if (text !== lastJson) {       // unchanged -> skip the (costly) re-render
        lastJson = text;
        render(s);
        document.getElementById("status").textContent =
          s.fen ? "live" : "waiting for position…";
      }
      if (pollOnce) return;
    } catch (e) {
      document.getElementById("status").textContent = "disconnected";
      await new Promise((res) => setTimeout(res, 500));
    }
  }
}
poll();

// --- in-app controls ---
// Shown only inside the desktop app. The app always loads the overlay with a
// ?app=<mode> query param, while the OBS browser source / a plain browser load
// the bare URL — so the buttons never appear on your stream.
function setupControls() {
  const params = new URLSearchParams(location.search);
  if (!params.has("app")) return;                 // not the app window -> hide
  const cur = params.get("app") || "desktop";
  const other = cur === "obs" ? "desktop" : "obs";
  const sw = document.getElementById("switchBtn");
  sw.textContent = "⇄ Switch to " + (other === "obs" ? "OBS" : "Desktop") + " mode";
  sw.onclick = () => {
    if (!(window.pywebview && window.pywebview.api)) return;
    sw.textContent = "switching…";
    window.pywebview.api.set_mode(other);
  };
  document.getElementById("quitBtn").onclick = () => {
    if (window.pywebview && window.pywebview.api) window.pywebview.api.quit();
  };
  document.getElementById("controls").style.display = "flex";
}
setupControls();
</script>
</body>
</html>
